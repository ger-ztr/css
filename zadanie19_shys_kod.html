    <div class="blok_pierwszy">
        <h1>Znacznik DIV (blok 1)-->ivan shyshlakov</h1>
        <p>
            <u><strong>Element blokowy (DIV)</strong></u> jest elementem blokowym może zawierać wewnątrz siebie zwykły tekst, jak również inne elementy blokowe. Został on pomyślany do tworzenia obszerniejszych struktur.<br>
            Zastosowanie DIV
        </p>
        <ul>
            <li>Z div'a powinno się korzystać kiedy potrzebujemy wyodrębnić poszczególne bloki w układzie dokumentu, na przykład lewa kolumna, menu nawigacyjne, stopka.</li>
            <li>Służy do utworzenia sekcji (bloku) w pliku HTML w celu ich sformatowania za pomocą arkusza stylów CSS.</li>
        </ul>
    </div>

    <span class="blok_drugi">
        <h1>Znacznik SPAN (blok 2)-->28.05.2026 r. godz. 18:11</h1>
        <ul>
            <li><u><strong>Elementy wyświetlanie w linii (SPAN)</strong></u> jest elementem liniowym nie mogą zawierać elementów blokowych, ale mogą inne elementy wyświetlane w linii oraz zwykły tekst.</li>
            <li>Jeśli chcemy w paragrafie część tekstu wyróżnić czerwonym kolorem, do wyodrębnienia tego tekstu nie możemy użyć elementu div (paragraf z zasady nie może zawierać elementów blokowych) tylko span. Wewnątrz DIV można oczywiście wpisać również SPAN.</li>
        </ul>
    </span>

    <!-- Ivan Shyshlakov -->
</body>
